<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Runner Light</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="game-container">
        <canvas id="game-canvas" width="800" height="400"></canvas>
        <div id="ui-layer">
            <div id="score-display">
                HI <span id="high-score-value">00000</span> &nbsp; SCORE: <span id="score-value">00000</span>
            </div>
            <div id="game-over-screen">
                <h1>SYSTEM FAILURE</h1>
                <p>Press SPACE or TAP to reboot</p>
            </div>
        </div>
    </div>

    <script src="js/art/parallax.js"></script>
    <script src="js/art/particles.js"></script>
    <script src="js/game.js"></script>
</body>

</html>
