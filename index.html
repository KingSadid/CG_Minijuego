<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yellow Ball Runner</title>
    <style>
        /* ESTILOS: Centrado y Reset básico */
        body {
            margin: 0;
            padding: 0;
            background-color: #202020; /* Gris oscuro para el cuerpo */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        canvas {
            border: 2px solid #333;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            display: block;
        }

        .instructions {
            position: absolute;
            top: 20px;
            color: #888;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="instructions">Presiona [ESPACIO], [FLECHA ARRIBA] o [CLICK] para saltar</div>
    <canvas id="gameCanvas" width="800" height="400"></canvas>

<script>
    /**
     * CONSTANTES DE CONFIGURACIÓN
     * Centralizamos los "magic numbers" para fácil ajuste.
     */
    const CONFIG = {
        CANVAS_BG: '#000000',
        GRAVITY: 0.6,
        JUMP_FORCE: -10,
        GAME_SPEED_START: 5,
        GAME_SPEED_INCREMENT: 0.001,
        SPAWN_TIMER_MIN: 60,
        SPAWN_TIMER_MAX: 120,
        PLAYER: {
            COLOR: '#FFD700', // Amarillo
            RADIUS: 15,
            X_POS: 50,
            BASE_Y: 350 // Suelo
        },
        OBSTACLE: {
            COLOR: '#FF4444',
            WIDTH_MIN: 20,
            WIDTH_MAX: 50,
            HEIGHT_MIN: 30,
            HEIGHT_MAX: 70
        },
        FONT: "20px 'Courier New', monospace"
    };

    /**
     * CLASE PLAYER (La Bola Amarilla)
     * Maneja la física, el salto y el dibujo del personaje.
     */
    class Player {
        constructor(ctx) {
            this.ctx = ctx;
            this.r = CONFIG.PLAYER.RADIUS;
            this.x = CONFIG.PLAYER.X_POS;
            this.y = CONFIG.PLAYER.BASE_Y - this.r;
            
            // Física
            this.dy = 0; // Velocidad vertical
            this.jumpForce = CONFIG.JUMP_FORCE;
            this.grounded = true;
        }

        jump() {
            if (this.grounded) {
                this.dy = this.jumpForce;
                this.grounded = false;
            }
        }

        update() {
            // Aplicar gravedad
            if (!this.grounded) {
                this.dy += CONFIG.GRAVITY;
                this.y += this.dy;
            }

            // Detección de suelo
            if (this.y + this.r >= CONFIG.PLAYER.BASE_Y) {
                this.y = CONFIG.PLAYER.BASE_Y - this.r;
                this.dy = 0;
                this.grounded = true;
            }
        }

        draw() {
            this.ctx.beginPath();
            this.ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
            this.ctx.fillStyle = CONFIG.PLAYER.COLOR;
            this.ctx.fill();
            this.ctx.closePath();
            
            // Sombra simple para efecto 3D
            this.ctx.beginPath();
            this.ctx.arc(this.x - 3, this.y - 3, this.r/3, 0, Math.PI * 2);
            this.ctx.fillStyle = "rgba(255,255,255,0.3)";
            this.ctx.fill();
            this.ctx.closePath();
        }
    }

    /**
     * CLASE OBSTACLE
     * Genera rectángulos con tamaños aleatorios.
     */
    class Obstacle {
        constructor(ctx, gameSpeed) {
            this.ctx = ctx;
            this.w = this.randomRange(CONFIG.OBSTACLE.WIDTH_MIN, CONFIG.OBSTACLE.WIDTH_MAX);
            this.h = this.randomRange(CONFIG.OBSTACLE.HEIGHT_MIN, CONFIG.OBSTACLE.HEIGHT_MAX);
            this.x = ctx.canvas.width + this.w;
            this.y = CONFIG.PLAYER.BASE_Y - this.h;
            this.markedForDeletion = false;
        }

        update(speed) {
            this.x -= speed;
            if (this.x + this.w < 0) {
                this.markedForDeletion = true;
            }
        }

        draw() {
            this.ctx.fillStyle = CONFIG.OBSTACLE.COLOR;
            this.ctx.fillRect(this.x, this.y, this.w, this.h);
        }

        randomRange(min, max) {
            return Math.random() * (max - min) + min;
        }
    }

    /**
     * CLASE GAME
     * El controlador principal ("Controller" en MVC).
     */
    class Game {
        constructor(canvasId) {
            this.canvas = document.getElementById(canvasId);
            this.ctx = this.canvas.getContext('2d');
            
            this.player = new Player(this.ctx);
            this.obstacles = [];
            
            this.score = 0;
            this.gameSpeed = CONFIG.GAME_SPEED_START;
            this.spawnTimer = 0;
            this.isGameOver = false;
            
            this.requestRef = null; // Referencia para cancelar la animación

            this.initInput();
            this.loop = this.loop.bind(this); // Asegurar contexto
            this.start();
        }

        initInput() {
            const jumpAction = () => {
                if (this.isGameOver) {
                    this.restart();
                } else {
                    this.player.jump();
                }
            };

            window.addEventListener('keydown', (e) => {
                if (e.code === 'Space' || e.code === 'ArrowUp') {
                    e.preventDefault(); // Evitar scroll
                    jumpAction();
                }
            });

            // Soporte para móviles/clicks
            this.canvas.addEventListener('touchstart', (e) => {
                 e.preventDefault();
                 jumpAction();
            });
            this.canvas.addEventListener('mousedown', jumpAction);
        }

        spawnObstacle() {
            this.spawnTimer--;
            if (this.spawnTimer <= 0) {
                this.obstacles.push(new Obstacle(this.ctx, this.gameSpeed));
                this.spawnTimer = this.obstacles[0].randomRange(CONFIG.SPAWN_TIMER_MIN, CONFIG.SPAWN_TIMER_MAX);
            }
        }

        /**
         * Detecta colisión entre Círculo (Jugador) y Rectángulo (Obstáculo)
         * Usamos el método de "Clamping" para mayor precisión.
         */
        checkCollision(circle, rect) {
            // Encontrar el punto más cercano en el rectángulo al centro del círculo
            let testX = circle.x;
            let testY = circle.y;

            // Clamp X
            if (circle.x < rect.x) testX = rect.x;
            else if (circle.x > rect.x + rect.w) testX = rect.x + rect.w;

            // Clamp Y
            if (circle.y < rect.y) testY = rect.y;
            else if (circle.y > rect.y + rect.h) testY = rect.y + rect.h;

            // Distancia entre el punto más cercano y el centro del círculo
            let distX = circle.x - testX;
            let distY = circle.y - testY;
            let distance = Math.sqrt((distX * distX) + (distY * distY));

            return distance <= circle.r;
        }

        update() {
            if (this.isGameOver) return;

            this.player.update();

            // Gestión de obstáculos
            this.spawnObstacle();
            this.obstacles.forEach(obs => obs.update(this.gameSpeed));
            this.obstacles = this.obstacles.filter(obs => !obs.markedForDeletion);

            // Colisiones
            for (let obs of this.obstacles) {
                if (this.checkCollision(this.player, obs)) {
                    this.isGameOver = true;
                }
            }

            // Aumentar dificultad y puntaje
            this.gameSpeed += CONFIG.GAME_SPEED_INCREMENT;
            this.score++;
        }

        draw() {
            // Limpiar Canvas
            this.ctx.fillStyle = CONFIG.CANVAS_BG;
            this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

            // Dibujar suelo (línea simple)
            this.ctx.strokeStyle = '#fff';
            this.ctx.beginPath();
            this.ctx.moveTo(0, CONFIG.PLAYER.BASE_Y);
            this.ctx.lineTo(this.canvas.width, CONFIG.PLAYER.BASE_Y);
            this.ctx.stroke();

            // Dibujar entidades
            this.player.draw();
            this.obstacles.forEach(obs => obs.draw());

            // UI: Puntaje
            this.ctx.fillStyle = '#fff';
            this.ctx.font = CONFIG.FONT;
            this.ctx.textAlign = 'right';
            this.ctx.fillText(`SCORE: ${Math.floor(this.score / 10)}`, this.canvas.width - 20, 30);

            // UI: Game Over
            if (this.isGameOver) {
                this.ctx.fillStyle = 'rgba(0,0,0,0.7)';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                this.ctx.fillStyle = '#fff';
                this.ctx.textAlign = 'center';
                this.ctx.font = "40px 'Courier New', monospace";
                this.ctx.fillText("GAME OVER", this.canvas.width/2, this.canvas.height/2);
                
                this.ctx.font = "20px 'Courier New', monospace";
                this.ctx.fillText("Presiona ESPACIO para reiniciar", this.canvas.width/2, this.canvas.height/2 + 40);
            }
        }

        loop() {
            this.update();
            this.draw();
            this.requestRef = requestAnimationFrame(this.loop);
        }

        start() {
            this.loop();
        }

        restart() {
            this.player = new Player(this.ctx);
            this.obstacles = [];
            this.score = 0;
            this.gameSpeed = CONFIG.GAME_SPEED_START;
            this.isGameOver = false;
            this.spawnTimer = 0;
        }
    }

    // Inicializar el juego cuando carga la página
    window.onload = () => {
        const game = new Game('gameCanvas');
    };

</script>
</body>
</html>
